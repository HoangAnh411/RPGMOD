plugins {
    id 'net.neoforged.gradle' version '6.0.0'
}

group = 'com.rpgpack'
version = '0.1.0'

java {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

minecraft {
    mappings channel: 'official', version: '1.20.1'

    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                rpgpack {
                    source sourceSets.main
                }
            }
        }

        server {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                rpgpack {
                    source sourceSets.main
                }
            }
        }
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.theillusivec4.top/' }
    maven { url = 'https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/' }
    maven { url = 'https://maven.blamejared.com/' }
}

dependencies {
    minecraft 'net.neoforged:forge:1.20.1-47.1.0'

    // Curios API
    runtimeOnly fg.deobf("top.theillusivec4.curios:curios-forge:5.2.0-beta.3+1.20.1")
    compileOnly fg.deobf("top.theillusivec4.curios:curios-forge:5.2.0-beta.3+1.20.1:api")

    // GeckoLib (recommended)
    runtimeOnly fg.deobf("software.bernie.geckolib:geckolib-forge-1.20.1:4.2.2")

    // Jade (optional)
    compileOnly fg.deobf("curse.maven:jade-324717:4686500")

    // JEI (optional)
    compileOnly fg.deobf("mezz.jei:jei-1.20.1-forge-api:15.2.0.27")
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
